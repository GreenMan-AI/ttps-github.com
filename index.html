<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>⚡ GuardIA</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    overflow-x: hidden;

    background: url("bg.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* overlay */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: -1;
}

/* logo */
.logo {
    text-align: center;
    font-size: 50px;
    margin-top: 40px;
}

/* saturs */
.center {
    text-align: center;
    margin-top: 80px;
}

.title {
    font-size: 60px;
    animation: glow 2s infinite alternate;
}

.subtitle {
    color: black;
    font-size: 22px;
}

/* poga */
button {
    margin-top: 40px;
    padding: 15px 30px;
    font-size: 18px;
    background: #22c55e;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* glow */
@keyframes glow {
    from { text-shadow: 0 0 10px #22c55e; }
    to { text-shadow: 0 0 30px #22c55e; }
}

/* kartītes */
.features {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 150px;
    margin-bottom: 100px;
    flex-wrap: wrap;
}

.card {
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 15px;
    width: 250px;
}

/* popup */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: black;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}

/* mute poga */
.mute {
    position: fixed;
    top: 20px;
    right: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="logo">⚡ GuardIA</div>

<div class="mute" onclick="toggleMusic()">🔊</div>

<div class="center">
    <h1 class="title">GuardIA Max Pro 🚀</h1>
    <p class="subtitle">Nākotnes AI drošība</p>
    <button onclick="openPopup()">Sākt</button>
</div>

<div class="features">
    <div class="card">🔒 Drošība</div>
    <div class="card">⚡ Ātrums</div>
    <div class="card">🤖 AI</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h2>Par GuardIA</h2>
        <p>Šī ir nākotnes AI drošības sistēma 🚀</p>

        <!-- bilde popup -->
        <img src="anime.png" width="200"><br><br>

        <button onclick="closePopup()">Aizvērt</button>
    </div>
</div>

<!-- MŪZIKA -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let music = document.getElementById("music");
let isPlaying = false;

function toggleMusic() {
    if (isPlaying) {
        music.pause();
        isPlaying = false;
    } else {
        music.play();
        isPlaying = true;
    }
}

function openPopup() {
    document.getElementById("popup").style.display = "flex";
    music.play();
    isPlaying = true;
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
