<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>⚡ GuardIA</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    overflow-x: hidden;

    background: url("bg.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* tumšais overlay */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: -1;
}

/* LOGO pa vidu */
.logo {
    text-align: center;
    font-size: 50px;
    font-weight: bold;
    margin-top: 40px;
}

/* saturs pa vidu */
.center {
    text-align: center;
    margin-top: 80px;
}

/* virsraksts */
.title {
    font-size: 60px;
    animation: glow 2s infinite alternate;
}

/* teksts melns */
.subtitle {
    color: black;
    font-size: 22px;
    margin-top: 10px;
}

/* poga ar atstarpi */
button {
    margin-top: 40px;
    padding: 15px 30px;
    font-size: 18px;
    background: #22c55e;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 10px #22c55e;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 25px #22c55e;
    transform: scale(1.05);
}

/* animācija */
@keyframes glow {
    from {
        text-shadow: 0 0 10px #22c55e;
    }
    to {
        text-shadow: 0 0 25px #22c55e, 0 0 40px #22c55e;
    }
}

/* kartītes zemāk */
.features {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 150px;
    margin-bottom: 100px;
    flex-wrap: wrap;
}

.card {
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 15px;
    width: 250px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px #22c55e;
}

/* anime vieta pa kreisi */
.anime {
    position: absolute;
    left: 50px;
    top: 250px;
    width: 200px;
    animation: float 3s ease-in-out infinite;
}

/* kustība */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
}

</style>
</head>

<body>

<div class="logo">⚡ GuardIA</div>

<!-- ANIME (ieliksi savu bildi) -->
<img src="anime.png" class="anime">

<div class="center">
    <h1 class="title">GuardIA Max Pro 🚀</h1>
    <p class="subtitle">Nākotnes AI drošība</p>
    <button onclick="alert('Strādā!')">Sākt</button>
</div>

<div class="features">

    <div class="card">
        <h3>🔒 Drošība</h3>
        <p>Augstākā līmeņa aizsardzība</p>
    </div>

    <div class="card">
        <h3>⚡ Ātrums</h3>
        <p>Zibens ātruma darbība</p>
    </div>

    <div class="card">
        <h3>🤖 AI</h3>
        <p>Gudra analīze un kontrole</p>
    </div>

</div>

</body>
</html>
