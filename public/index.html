<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Auth Test OK</title>
</head>
<body>

<h2>LOGIN</h2>
<input id="l-u" placeholder="username">
<input id="l-p" type="password" placeholder="password">
<button id="btn-login">LOGIN</button>
<div id="l-err" style="color:red"></div>

<h2>REGISTER</h2>
<input id="r-u" placeholder="username">
<input id="r-p" type="password" placeholder="password">
<button id="btn-reg">REGISTER</button>
<div id="r-err" style="color:red"></div>

<script>
const S = {};

async function api(url, opts={}) {
  console.log("API CALL:", url, opts);
  return { token:"123", username:"test", role:"user" };
}

// ✅ VIENS BLOKS
document.getElementById('btn-login').addEventListener('click',async()=>{
  const u=document.getElementById('l-u').value.trim();
  const p=document.getElementById('l-p').value;
  document.getElementById('l-err').textContent='';
  try{
    const d=await api('/api/login',{method:'POST',body:JSON.stringify({username:u,password:p})});
    console.log("LOGIN OK", d);
  }catch(e){
    document.getElementById('l-err').textContent=e.message;
  }
});

document.getElementById('btn-reg').addEventListener('click',async()=>{
  const u=document.getElementById('r-u').value.trim();
  const p=document.getElementById('r-p').value;
  document.getElementById('r-err').textContent='';
  try{
    const d=await api('/api/register',{method:'POST',body:JSON.stringify({username:u,password:p})});
    console.log("REGISTER OK", d);
  }catch(e){
    document.getElementById('r-err').textContent=e.message;
  }
});
</script>

</body>
</html>
