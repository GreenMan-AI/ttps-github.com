<script>
// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
const S = {
  token:    localStorage.getItem('mb_t')||null,
  username: localStorage.getItem('mb_u')||null,
  role:     localStorage.getItem('mb_r')||null,
  bgUrl:    localStorage.getItem('mb_bg')||'',
  tracks:[], folders:[], myFolders:[], playlist:[], favorites:[],
  queue:[], qi:-1, shuf:false, rep:false, playing:false,
  activeFid:null, searchQ:'',
};

const aud = document.getElementById('aud');
aud.volume = 0.8;

// ════════════════════════════════════════
//  API
// ════════════════════════════════════════
async function api(url, opts={}) {
  const h = {'Content-Type':'application/json'};
  if (S.token) h['Authorization'] = 'Bearer '+S.token;

  const r = await fetch(url, {...opts, headers:{...h,...(opts.headers||{})}});
  const d = await r.json();

  if (!r.ok) throw new Error(d.error||'Kļūda');
  return d;
}

// ════════════════════════════════════════
//  AUTH (FIXED - ONLY ONE BLOCK)
// ════════════════════════════════════════

// LOGIN
document.getElementById('btn-login').addEventListener('click',async()=>{
  const u=document.getElementById('l-u').value.trim();
  const p=document.getElementById('l-p').value;

  document.getElementById('l-err').textContent='';

  try{
    const d=await api('/api/login',{
      method:'POST',
      body:JSON.stringify({username:u,password:p})
    });

    S.token=d.token;
    S.username=d.username;
    S.role=d.role;
    S.bgUrl=d.bgUrl||'';

    localStorage.setItem('mb_t',d.token);
    localStorage.setItem('mb_u',d.username);
    localStorage.setItem('mb_r',d.role);
    localStorage.setItem('mb_bg',d.bgUrl||'');

    applyBg(S.bgUrl);

    const me=await api('/api/me');
    S.favorites=me.favorites||[];

    closeAuth();
    hideSplash();
    updateTopbar();

    await loadAll();
    renderSidebar();
    renderAllTracks();

    toast('Sveicināts, '+d.username+'!','ok');

  }catch(e){
    document.getElementById('l-err').textContent=e.message;
  }
});

// REGISTER
document.getElementById('btn-reg').addEventListener('click',async()=>{
  const u=document.getElementById('r-u').value.trim();
  const p=document.getElementById('r-p').value;

  document.getElementById('r-err').textContent='';

  try{
    const d=await api('/api/register',{
      method:'POST',
      body:JSON.stringify({username:u,password:p})
    });

    S.token=d.token;
    S.username=d.username;
    S.role=d.role;
    S.bgUrl='';

    localStorage.setItem('mb_t',d.token);
    localStorage.setItem('mb_u',d.username);
    localStorage.setItem('mb_r',d.role);

    S.favorites=[];

    closeAuth();
    hideSplash();
    updateTopbar();

    await loadAll();
    renderSidebar();
    renderAllTracks();

    toast('Konts izveidots!','ok');

  }catch(e){
    document.getElementById('r-err').textContent=e.message;
  }
});

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
async function init() {
  applyBg(S.bgUrl);

  if (S.token) {
    try {
      const m = await api('/api/me');
      S.username=m.username;
      S.role=m.role;
      S.bgUrl=m.bgUrl||'';
      S.favorites=m.favorites||[];

      localStorage.setItem('mb_r',m.role);
      localStorage.setItem('mb_bg',m.bgUrl||'');

      applyBg(S.bgUrl);

      setTimeout(()=>hideSplash(), 1800);
    } catch(e) {
      clearSess();
    }
  }

  updateTopbar();
  await loadAll();
  renderSidebar();
  renderAllTracks();
}

init();
</script>
